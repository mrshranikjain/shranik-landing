<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shranik Jain — Director of Product @ Moglix</title>
  <meta name="description" content="Shranik Jain — Director of Product at Moglix. AI Agents & E-Commerce, Full Stack Builder, Ex-IndiaMART & Sinch, MBA from IIT Delhi.">
  <style>
    :root {
      --bg: #0f0f0f;
      --card: #1a1a1a;
      --accent: #6366f1;
      --accent-light: #818cf8;
      --text: #e5e5e5;
      --muted: #9ca3af;
      --border: #2a2a2a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      max-width: 560px;
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent-light));
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      font-weight: 700;
      margin: 0 auto 1.5rem;
      color: white;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .title {
      font-size: 1rem;
      color: var(--accent-light);
      font-weight: 500;
      margin-bottom: 1.75rem;
    }

    .bio {
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--muted);
      margin-bottom: 1.75rem;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .tag {
      padding: 0.4rem 0.9rem;
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 8px;
      font-size: 0.82rem;
      color: var(--accent-light);
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
    }

    .link {
      padding: 0.6rem 1.25rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .link:hover {
      border-color: var(--accent);
      background: rgba(99, 102, 241, 0.08);
      color: var(--accent-light);
    }

    .link svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #555;
    }

    @media (max-width: 480px) {
      .card { padding: 2rem 1.5rem; }
      h1 { font-size: 1.35rem; }
      .bio { font-size: 0.88rem; }
    }
  </style>
</head>
<body>
